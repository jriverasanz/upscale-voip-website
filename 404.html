<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Upscale VoIP</title>
        <script>
            // Single Page Apps for GitHub Pages
            // This correctly handles client-side routing by redirecting
            // all 404s to index.html with the original path preserved
            (function () {
                var segmentCount = 1;
                var l = window.location;
                var path = l.pathname
                    .split("/")
                    .slice(segmentCount + 1)
                    .join("/")
                    .replace(/&/g, "~and~");
                l.replace(
                    l.protocol +
                        "//" +
                        l.hostname +
                        (l.port ? ":" + l.port : "") +
                        l.pathname
                            .split("/")
                            .slice(0, segmentCount + 1)
                            .join("/") +
                        "/?p=/" +
                        path +
                        (l.search
                            ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
                            : "") +
                        l.hash,
                );
            })();
        </script>
    </head>
    <body></body>
</html>
